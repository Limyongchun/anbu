openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: family
    description: Family connection operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /family/create:
    post:
      operationId: createFamily
      tags: [family]
      summary: Create a new family group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFamilyRequest"
      responses:
        "200":
          description: Family created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"

  /family/join:
    post:
      operationId: joinFamily
      tags: [family]
      summary: Join an existing family group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinFamilyRequest"
      responses:
        "200":
          description: Joined successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMember"
        "404":
          description: Family not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /family/{code}:
    get:
      operationId: getFamily
      tags: [family]
      summary: Get family group info
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Family info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyGroup"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /family/{code}/location:
    get:
      operationId: getFamilyLocation
      tags: [family]
      summary: Get latest location for a family member
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: deviceId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Location data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationData"
        "404":
          description: No location found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateLocation
      tags: [family]
      summary: Update device location
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLocationRequest"
      responses:
        "200":
          description: Location updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LocationData"

  /family/{code}/locations:
    get:
      operationId: getAllLocations
      tags: [family]
      summary: Get all member locations in the family
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All locations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LocationData"

  /family/{code}/messages:
    get:
      operationId: getFamilyMessages
      tags: [family]
      summary: Get messages for the family
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Messages list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FamilyMessage"
    post:
      operationId: sendMessage
      tags: [family]
      summary: Send a message to the family
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMessage"

  /family/{code}/messages/{messageId}/heart:
    post:
      operationId: heartMessage
      tags: [family]
      summary: Heart a message
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Heart added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FamilyMessage"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    CreateFamilyRequest:
      type: object
      properties:
        deviceId:
          type: string
        memberName:
          type: string
        role:
          type: string
          enum: [parent, child]
      required:
        - deviceId
        - memberName
        - role

    JoinFamilyRequest:
      type: object
      properties:
        code:
          type: string
        deviceId:
          type: string
        memberName:
          type: string
        role:
          type: string
          enum: [parent, child]
      required:
        - code
        - deviceId
        - memberName
        - role

    FamilyGroup:
      type: object
      properties:
        code:
          type: string
        members:
          type: array
          items:
            $ref: "#/components/schemas/FamilyMember"
        createdAt:
          type: string
      required:
        - code
        - members
        - createdAt

    FamilyMember:
      type: object
      properties:
        id:
          type: integer
        familyCode:
          type: string
        deviceId:
          type: string
        memberName:
          type: string
        role:
          type: string
          enum: [parent, child]
        joinedAt:
          type: string
      required:
        - id
        - familyCode
        - deviceId
        - memberName
        - role
        - joinedAt

    LocationData:
      type: object
      properties:
        id:
          type: integer
        familyCode:
          type: string
        deviceId:
          type: string
        memberName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
        accuracy:
          type: number
        battery:
          type: number
        isSharing:
          type: boolean
        updatedAt:
          type: string
      required:
        - id
        - familyCode
        - deviceId
        - memberName
        - latitude
        - longitude
        - isSharing
        - updatedAt

    UpdateLocationRequest:
      type: object
      properties:
        deviceId:
          type: string
        memberName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
        accuracy:
          type: number
        battery:
          type: number
        isSharing:
          type: boolean
      required:
        - deviceId
        - memberName
        - latitude
        - longitude
        - isSharing

    FamilyMessage:
      type: object
      properties:
        id:
          type: integer
        familyCode:
          type: string
        fromName:
          type: string
        fromRole:
          type: string
        text:
          type: string
        hearts:
          type: integer
        createdAt:
          type: string
      required:
        - id
        - familyCode
        - fromName
        - fromRole
        - text
        - hearts
        - createdAt

    SendMessageRequest:
      type: object
      properties:
        fromName:
          type: string
        fromRole:
          type: string
        text:
          type: string
      required:
        - fromName
        - fromRole
        - text
